<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Órbita SAN - Soldadura VR & XR</title>
  
  <!-- Librería de A-Frame VR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- Google Fonts para la pantalla de bienvenida 2D -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; }
    #pantalla-inicio { position: fixed; inset: 0; z-index: 999; background: radial-gradient(circle at center, #050510 0%, #000000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; padding: 20px; transition: opacity 1s ease-in-out; }
    #pantalla-inicio::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.3; pointer-events: none; }
    
    #pantalla-inicio h2 { font-size: 1.2rem; color: #a0a0ff; margin-bottom: 0; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; }
    #pantalla-inicio h1 { font-family: 'Cinzel', serif; font-size: 4rem; color: #e0d070; margin-top: 0; margin-bottom: 0.5rem; letter-spacing: 6px; text-shadow: 0 0 20px rgba(224, 208, 112, 0.3); }
    #pantalla-inicio p { color: #bbb; font-size: 1.1rem; margin-bottom: 3rem; line-height: 1.6; max-width: 600px; }
    
    #btn-entrar { padding: 16px 56px; background: rgba(224, 208, 112, 0.05); border: 1px solid #e0d070; border-radius: 50px; color: #e0d070; font-size: 1.2rem; cursor: pointer; letter-spacing: 3px; transition: all 0.4s ease; box-shadow: 0 0 15px rgba(224, 208, 112, 0.1); }
    #btn-entrar:hover { background: #e0d070; color: #000; box-shadow: 0 0 30px rgba(224, 208, 112, 0.6); transform: scale(1.05); }
  </style>

  <script>
    // Mapeo preciso entre el ID de concepto y la ID de la tarjeta explicativa original
    const ASOCIACIONES_SAN = {
      'concept_ac': { cardId: '#card_ac' },
      'concept_arco': { cardId: '#card_arco' },
      'concept_bano': { cardId: '#card_bano' },
      'concept_cordon': { cardId: '#card_cordon' },
      'concept_dc': { cardId: '#card_dc' },
      'concept_e6013': { cardId: '#card_e6013' },
      'concept_e7016': { cardId: '#card_e7016' },
      'concept_e7018': { cardId: '#card_e7018' },
      'concept_e7024': { cardId: '#card_e7024' },
      'concept_electrodo': { cardId: '#card_electrodo' },
      'concept_escoria': { cardId: '#card_escoria' },
      'concept_higroscopico': { cardId: '#card_higroscopico' },
      'concept_intensidad': { cardId: '#card_intensidad' },
      'concept_ionizacion': { cardId: '#card_ionizacion' },
      'concept_masa': { cardId: '#card_masa' },
      'concept_penetracion': { cardId: '#card_penetracion' },
      'concept_piqueta': { cardId: '#card_piqueta' },
      'concept_plasma': { cardId: '#card_plasma' },
      'concept_polaridad': { cardId: '#card_polaridad' },
      'concept_polaridad_directa': { cardId: '#card_polaridad_directa' },
      'concept_polaridad_inversa': { cardId: '#card_polaridad_inversa' },
      'concept_revestimiento': { cardId: '#card_revestimiento' },
      'concept_tension': { cardId: '#card_tension' },
      'concept_wps': { cardId: '#card_wps' },
      'concept_zat': { cardId: '#card_zat' }
    };

    // Componente de oscilación y flotación sutil e independiente
    AFRAME.registerComponent('movimiento-vivo', {
      init: function () {
        this.homePos = new THREE.Vector3().copy(this.el.object3D.position);
        this.proximoDestino();
      },
      proximoDestino: function () {
        const el = this.el;
        if (!el) return;
        
        // Desplazamiento sutil e independiente en ejes X, Y y Z para simular flotación
        const targetX = this.homePos.x + (Math.random() - 0.5) * 0.8;
        const targetY = this.homePos.y + (Math.random() - 0.5) * 0.6;
        const targetZ = this.homePos.z + (Math.random() - 0.5) * 0.6;
        const duracion = 5000 + Math.random() * 4000;

        el.setAttribute('animation__pos', {
          property: 'position',
          to: `${targetX} ${targetY} ${targetZ}`,
          dur: duracion,
          easing: 'easeInOutSine'
        });
        
        setTimeout(() => { if (this.el) this.proximoDestino(); }, duracion);
      }
    });

    // Componente de generación de chispas y proyecciones dinámicas de soldadura
    AFRAME.registerComponent('generador-chispas', {
      schema: {
        cantidad: {type: 'int', default: 35}
      },
      init: function () {
        for (let i = 0; i < this.data.cantidad; i++) {
          this.crearChispa();
        }
      },
      crearChispa: function () {
        const chispa = document.createElement('a-entity');
        
        // Geometría aleatoria simulando chispas facetadas incandescentes
        const tipos = ['octahedron', 'tetrahedron'];
        const tipo = tipos[Math.floor(Math.random() * tipos.length)];
        chispa.setAttribute('geometry', {
          primitive: tipo,
          radius: 0.015 + Math.random() * 0.03
        });

        // Colores de arco eléctrico (Cian/Azul plasma y dorado incandescente)
        const colores = ['#4df0ff', '#e0d070', '#ff6600', '#ffffff'];
        const color = colores[Math.floor(Math.random() * colores.length)];
        
        chispa.setAttribute('material', {
          color: color,
          shader: 'flat',
          transparent: true,
          opacity: 0.8
        });

        // Posición inicial cerca del núcleo central
        const x = (Math.random() - 0.5) * 0.4;
        const y = 0.5 + Math.random() * 0.4;
        const z = (Math.random() - 0.5) * 0.4;
        chispa.setAttribute('position', `${x} ${y} ${z}`);

        // Animación de dispersión, rotación y desvanecimiento
        const tx = x + (Math.random() - 0.5) * 2.5;
        const ty = y + 1.2 + Math.random() * 1.5;
        const tz = z + (Math.random() - 0.5) * 2.5;
        const dur = 2500 + Math.random() * 3500;

        chispa.setAttribute('animation__pos', {
          property: 'position',
          to: `${tx} ${ty} ${tz}`,
          dur: dur,
          loop: true,
          easing: 'easeOutQuad'
        });

        chispa.setAttribute('animation__rot', {
          property: 'rotation',
          to: `${Math.random() * 360} ${Math.random() * 360} ${Math.random() * 360}`,
          dur: dur,
          loop: true,
          easing: 'linear'
        });

        chispa.setAttribute('animation__scl', {
          property: 'scale',
          from: '1 1 1',
          to: '0.01 0.01 0.01',
          dur: dur,
          loop: true,
          easing: 'easeInQuad'
        });

        this.el.appendChild(chispa);
      }
    });

    // Componente interactivo para punteros láser de Quest 3 y mouse en PC
    AFRAME.registerComponent('palabra-interactiva', {
      schema: { idConcepto: {type: 'string'} },
      init: function () {
        var el = this.el;
        var data = this.data;

        // Hover: El término visual brilla en dorado SAN y aumenta su tamaño sutilmente
        el.addEventListener('mouseenter', function () {
          var parent = el.parentNode;
          var img = parent.querySelector('a-image');
          if (img) {
            img.setAttribute('color', '#e0d070');
            img.setAttribute('scale', '1.25 1.25 1.25');
          }
        });

        // Leave: Regresa al color y escala originales
        el.addEventListener('mouseleave', function () {
          var parent = el.parentNode;
          var img = parent.querySelector('a-image');
          if (img) {
            img.setAttribute('color', '#ffffff');
            img.setAttribute('scale', '1 1 1');
          }
        });

        // Click / Trigger: Cambia la textura del panel explicativo por la tarjeta correspondiente
        el.addEventListener('click', function () {
          var asociacion = ASOCIACIONES_SAN[data.idConcepto];
          if (!asociacion) return;

          var panel = document.querySelector('#panel-info-dinamico');
          var cardImagen = document.querySelector('#card-contenido-img');
          
          // Cambia la textura de la tarjeta de explicación por la ID precargada
          cardImagen.setAttribute('src', asociacion.cardId);
          
          // Abre el panel explicativo de manera frontal y fluida
          panel.setAttribute('visible', 'true');
          panel.setAttribute('animation__abrir', 'property: scale; from: 0.01 0.01 0.01; to: 1 1 1; dur: 450; easing: easeOutBack');
        });
      }
    });

    // Componente para alternar entre el modo VR (Cielo espacial) e XR (Passthrough/Mixto)
    AFRAME.registerComponent('control-entorno', {
      schema: { modo: {type: 'string'} },
      init: function () {
        var el = this.el;
        var modo = this.data.modo;

        el.addEventListener('mouseenter', function () {
          el.setAttribute('scale', '1.1 1.1 1.1');
        });
        el.addEventListener('mouseleave', function () {
          el.setAttribute('scale', '1 1 1');
        });

        el.addEventListener('click', function () {
          var scene = document.querySelector('a-scene');
          var estrellas = document.querySelector('#estrellas');
          var btnVR = document.querySelector('#btn-vr-active');
          var btnXR = document.querySelector('#btn-xr-active');

          if (modo === 'xr') {
            // Desactiva niebla y estrellas para dejar paso limpio al Passthrough real
            scene.setAttribute('fog', 'density: 0');
            estrellas.setAttribute('visible', 'false');
            scene.setAttribute('background', 'transparent: true; color: #000');
            
            // Actualización visual de los botones 3D
            btnVR.setAttribute('color', '#111122');
            btnXR.setAttribute('color', '#e0d070');
            btnVR.querySelector('a-text').setAttribute('color', '#ffffff');
            btnXR.querySelector('a-text').setAttribute('color', '#000000');
          } else {
            // Reestablece el espacio cósmico y la atmósfera misteriosa (Modo VR)
            scene.setAttribute('fog', 'type: exponential; color: #000008; density: 0.06');
            estrellas.setAttribute('visible', 'true');
            scene.setAttribute('background', 'color: #000005');
            
            // Actualización visual de los botones 3D
            btnVR.setAttribute('color', '#e0d070');
            btnXR.setAttribute('color', '#111122');
            btnVR.querySelector('a-text').setAttribute('color', '#000000');
            btnXR.querySelector('a-text').setAttribute('color', '#ffffff');
          }
        });
      }
    });
  </script>
</head>
<body>

<!-- Pantalla de Bienvenida (Capa 2D) -->
<div id="pantalla-inicio">
  <h2>MÓDULO SAN</h2>
  <h1>ÓRBITA SAN</h1>
  <p>Glosario de Soldadura en Atmósfera Natural interactivo.<br>
  <small style="font-size: 0.85rem; color:#888; margin-top:10px; display:inline-block;">Apunta a las palabras flotantes y pulsa el gatillo de tus mandos de Meta Quest 3 o haz clic en PC.</small></p>
  <button id="btn-entrar" onclick="iniciar()">ENTRAR</button>
</div>

<!-- Escena VR de A-Frame -->
<a-scene background="color:#000005" 
         fog="type: exponential; color: #000008; density: 0.06" 
         renderer="antialias: true; colorManagement: true;"
         webxr="referenceSpaceType: localFloor; optionalFeatures: pass-through;"
         cursor="rayOrigin: mouse"
         raycaster="objects: .interactable; interval: 100">
  
  <a-assets timeout="15000">
    <!-- Precarga de todas las tarjetas explicativas diseñadas -->
    <img id="card_ac" src="./ac.png">
    <img id="card_arco" src="./arco-electrico.png">
    <img id="card_bano" src="./bano-de-fusion.png">
    <img id="card_cordon" src="./cordon.png">
    <img id="card_dc" src="./dc.png">
    <img id="card_e6013" src="./e6013.png">
    <img id="card_e7016" src="./e7016.png">
    <img id="card_e7018" src="./e7018.png">
    <img id="card_e7024" src="./e7024.png">
    <img id="card_electrodo" src="./electrodo.png">
    <img id="card_escoria" src="./escoria.png">
    <img id="card_higroscopico" src="./higroscopico.png">
    <img id="card_intensidad" src="./intensidad-de-corriente.png">
    <img id="card_ionizacion" src="./ionizacion.png">
    <img id="card_masa" src="./masa.png">
    <img id="card_penetracion" src="./penetracion.png">
    <img id="card_piqueta" src="./piqueta.png">
    <img id="card_plasma" src="./plasma.png">
    <img id="card_polaridad" src="./polaridad.png">
    <img id="card_polaridad_directa" src="./polaridad-directa-dcminus.png">
    <img id="card_polaridad_inversa" src="./polaridad-inversa-dcplus.png">
    <img id="card_revestimiento" src="./revestimiento.png">
    <img id="card_tension" src="./tension.png">
    <img id="card_wps" src="./wps.png">
    <img id="card_zat" src="./zat.png">

    <!-- Referencia de audio actualizada -->
    <audio id="musica-fondo" src="./orbitaSAN.mp3" loop preload="auto"></audio>
    
    <!-- Textura de seguridad de carga provisional -->
    <img id="fallback" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
  </a-assets>

  <!-- Luces estéticas de ambiente y apoyo -->
  <a-light type="ambient" color="#111122"></a-light>
  <a-light type="point" position="0 5 0" color="#5555aa" intensity="0.6"></a-light>
  
  <!-- Espacio estelar dinámico -->
  <a-entity id="estrellas"></a-entity>

  <!-- EFECTOS DE CHISPAS EN EL CENTRO -->
  <a-entity generador-chispas position="0 0.5 0"></a-entity>

  <!-- PANEL DE SELECCIÓN DE ENTORNO (VR vs XR) -->
  <!-- Flota a la izquierda del usuario para fácil acceso -->
  <a-entity id="consola-entorno" position="-1.5 1.5 -1.2" rotation="10 40 0">
    <a-plane width="1.2" height="0.8" color="#000" opacity="0.9" material="shader:flat">
      <!-- Borde del panel -->
      <a-plane width="1.24" height="0.84" color="#e0d070" position="0 0 -0.01" opacity="0.3" material="shader:flat"></a-plane>
      
      <a-text value="ENTORNO" font="exo2bold" align="center" color="#e0d070" width="3" position="0 0.28 0.01"></a-text>
      
      <!-- Botón Modo VR -->
      <a-plane id="btn-vr-active" class="interactable" control-entorno="modo: vr" width="0.9" height="0.18" color="#e0d070" position="0 0.05 0.02" material="shader:flat">
        <a-text value="VR ESPACIO" font="exo2bold" align="center" color="#000" width="2.4"></a-text>
      </a-plane>

      <!-- Botón Modo XR (Realidad Mixta Passthrough) -->
      <a-plane id="btn-xr-active" class="interactable" control-entorno="modo: xr" width="0.9" height="0.18" color="#111122" position="0 -0.18 0.02" material="shader:flat">
        <a-text value="XR MIXTA" font="exo2bold" align="center" color="#fff" width="2.4"></a-text>
      </a-plane>
    </a-plane>
  </a-entity>

  <!-- NUBE DE TÉRMINOS FLOTANTES EN 360 GRADOS (Distribución cilíndrica constante) -->
  <a-entity id="nube-palabras" position="0 0 0" visible="false" animation="property: rotation; to: 0 360 0; loop: true; dur: 75000; easing: linear">
    
    <!-- 1. AC (Ángulo 0.0°) -->
    <a-entity movimiento-vivo position="0 1.7 -3.2">
      <a-image src="./termino_ac.png" width="1.2" height="0.4" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_ac" width="1.6" height="0.8" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>
    
    <!-- 2. Arco Eléctrico (Ángulo 14.4°) -->
    <a-entity movimiento-vivo position="0.80 1.3 -3.10" rotation="0 -14.4 0">
      <a-image src="./termino_arco-electrico.png" width="1.8" height="0.6" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_arco" width="2.2" height="1.0" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>
    
    <!-- 3. Baño de Fusión (Ángulo 28.8°) -->
    <a-entity movimiento-vivo position="1.54 2.0 -2.80" rotation="0 -28.8 0">
      <a-image src="./termino_bano-de-fusion.png" width="1.8" height="0.6" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_bano" width="2.2" height="1.0" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 4. Cordón (Ángulo 43.2°) -->
    <a-entity movimiento-vivo position="2.19 1.5 -2.33" rotation="0 -43.2 0">
      <a-image src="./termino_cordon.png" width="1.5" height="0.5" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_cordon" width="1.9" height="0.9" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>
    
    <!-- 5. DC (Ángulo 57.6°) -->
    <a-entity movimiento-vivo position="2.70 1.8 -1.71" rotation="0 -57.6 0">
      <a-image src="./termino_dc.png" width="1.2" height="0.4" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_dc" width="1.6" height="0.8" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 6. E6013 (Ángulo 72.0°) -->
    <a-entity movimiento-vivo position="3.04 1.2 -0.99" rotation="0 -72.0 0">
      <a-image src="./termino_e6013.png" width="1.5" height="0.5" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_e6013" width="1.9" height="0.9" material="opacity: 0; transparent: true" position="0 0 0.01"></a-entity>

    <!-- 7. E7016 (Ángulo 86.4°) -->
    <a-entity movimiento-vivo position="3.19 2.2 -0.20" rotation="0 -86.4 0">
      <a-image src="./termino_e7016.png" width="1.5" height="0.5" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_e7016" width="1.9" height="0.9" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>
    
    <!-- 8. E7018 (Ángulo 100.8°) -->
    <a-entity movimiento-vivo position="3.14 1.4 0.60" rotation="0 -100.8 0">
      <a-image src="./termino_e7018.png" width="1.5" height="0.5" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_e7018" width="1.9" height="0.9" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 9. E7024 (Ángulo 115.2°) -->
    <a-entity movimiento-vivo position="2.90 1.9 1.36" rotation="0 -115.2 0">
      <a-image src="./termino_e7024.png" width="1.5" height="0.5" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_e7024" width="1.9" height="0.9" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 10. Electrodo (Ángulo 129.6°) -->
    <a-entity movimiento-vivo position="2.46 1.1 2.04" rotation="0 -129.6 0">
      <a-image src="./termino_electrodo.png" width="1.8" height="0.6" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_electrodo" width="2.2" height="1.0" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 11. Escoria (Ángulo 144.0°) -->
    <a-entity movimiento-vivo position="1.88 2.3 2.59" rotation="0 -144.0 0">
      <a-image src="./termino_escoria.png" width="1.4" height="0.35" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_escoria" width="1.8" height="0.75" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 12. Higroscópico (Ángulo 158.4°) -->
    <a-entity movimiento-vivo position="1.18 1.6 2.98" rotation="0 -158.4 0">
      <a-image src="./termino_higroscopico.png" width="1.6" height="0.4" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_higroscopico" width="2.0" height="0.8" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 13. Intensidad de Corriente (Ángulo 172.8°) -->
    <a-entity movimiento-vivo position="0.40 1.9 3.18" rotation="0 -172.8 0">
      <a-image src="./termino_intensidad-de-corriente.png" width="2.4" height="0.6" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_intensidad" width="2.8" height="1.0" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 14. Ionización (Ángulo 187.2°) -->
    <a-entity movimiento-vivo position="-0.40 1.3 3.18" rotation="0 -187.2 0">
      <a-image src="./termino_ionizacion.png" width="1.6" height="0.4" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_ionizacion" width="2.0" height="0.8" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 15. Masa (Ángulo 201.6°) -->
    <a-entity movimiento-vivo position="-1.18 2.1 2.98" rotation="0 -201.6 0">
      <a-image src="./termino_masa.png" width="1.2" height="0.3" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_masa" width="1.6" height="0.7" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 16. Penetración (Ángulo 216.0°) -->
    <a-entity movimiento-vivo position="-1.88 1.5 2.59" rotation="0 -216.0 0">
      <a-image src="./termino_penetracion.png" width="1.6" height="0.4" transparent="true"></a-image>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_penetracion" width="2.0" height="0.8" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

  <a-entity id="panel-info-dinamico" position="0 1.6 -1.8" scale="0.01 0.01 0.01" visible="false">
    <!-- Marco de profundidad estético -->
    <a-plane width="2.40" height="1.44" color="#000000" opacity="0.8" material="shader: flat">
      <a-plane width="2.44" height="1.48" color="#e0d070" position="0 0 -0.01" opacity="0.3" material="shader: flat"></a-plane>
      
      <!-- Ficha explicativa PNG dinámica (Se actualiza con la tarjeta correspondiente de la caché GPU) -->
      <a-image id="card-contenido-img" src="#fallback" width="2.38" height="1.42" position="0 0 0.01" material="shader: flat; transparent: true;"></a-image>
      
      <!-- Botón de Cierre interactivo -->
      <a-plane class="interactable" width="0.6" height="0.18" color="#992222" position="0 -0.85 0.02"
               animation__hover="property: scale; to: 1.1 1.1 1.1; dur: 150; startEvents: mouseenter"
               animation__leave="property: scale; to: 1 1 1; dur: 150; startEvents: mouseleave"
               onclick="document.querySelector('#panel-info-dinamico').setAttribute('visible', 'false')">
        <a-text value="CERRAR" font="exo2bold" align="center" color="#ffffff" width="2.2" position="0 0 0.01"></a-text>
      </a-plane>
    </a-plane>
  </a-entity>

  <!-- RIG DE CÁMARA Y MANDOS QUEST 3 (Configuración completa de controles) -->
  <a-entity id="rig">
    <a-camera position="0 1.6 0" wasd-controls look-controls="pointerLockEnabled: false"></a-camera>
    <a-entity laser-controls="hand:left" raycaster="objects: .interactable; far:10; showLine: true" line="color: #4444aa; opacity: 0.5"></a-entity>
    <a-entity laser-controls="hand:right" raycaster="objects: .interactable; far:10; showLine: true" line="color: #e0d070; opacity: 0.5"></a-entity>
  </a-entity>

<script>
  // Inicialización de música de fondo y desvanecimiento de la pantalla de carga
  function iniciar() {
    document.getElementById('pantalla-inicio').style.opacity = '0';
    const audio = document.getElementById('musica-fondo');
    if (audio) {
      audio.volume = 0.45;
      audio.play().catch(e => console.log("Interacción requerida por el navegador para reproducir audio."));
    }
    setTimeout(() => { 
      document.getElementById('pantalla-inicio').style.display = 'none';
      document.getElementById('nube-palabras').setAttribute('visible', 'true');
    }, 1000);
  }

  // Generador estético de campo de estrellas 3D
  function crearEstrellas() {
    const contenedor = document.getElementById('estrellas');
    for (let i = 0; i < 250; i++) {
      const e = document.createElement('a-sphere');
      const r = 25 + Math.random() * 10;
      const t = Math.random() * Math.PI * 2;
      const p = Math.random() * Math.PI;
      e.setAttribute('position', `${r * Math.sin(p) * Math.cos(t)} ${r * Math.cos(p)} ${r * Math.sin(p) * Math.sin(t)}`);
      e.setAttribute('radius', 0.02 + Math.random() * 0.04);
      e.setAttribute('material', 'color: #ffffff; shader: flat');
      contenedor.appendChild(e);
    }
  }

  // Acceso inmediato si el visor Meta Quest 3 inicia directo en modo VR/XR
  document.querySelector('a-scene').addEventListener('enter-vr', () => {
    document.getElementById('pantalla-inicio').style.display = 'none';
    const audio = document.getElementById('musica-fondo');
    if (audio) audio.play().catch(e => {});
    document.getElementById('nube-palabras').setAttribute('visible', 'true');

    // Auto-activar configuración XR si detectamos que ha entrado específicamente en modo AR (Passthrough)
    var scene = document.querySelector('a-scene');
    if (scene.is('ar-mode')) {
      scene.setAttribute('fog', 'density: 0');
      document.querySelector('#estrellas').setAttribute('visible', 'false');
      scene.setAttribute('background', 'transparent: true; color: #000');
      
      document.querySelector('#btn-vr-active').setAttribute('color', '#111122');
      document.querySelector('#btn-xr-active').setAttribute('color', '#e0d070');
      document.querySelector('#btn-vr-active').querySelector('a-text').setAttribute('color', '#ffffff');
      document.querySelector('#btn-xr-active').querySelector('a-text').setAttribute('color', '#000000');
    }
  });

  window.addEventListener('load', () => { 
    crearEstrellas();
  });
</script>
</body>
</html>
