<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Órbita SAN - Soldadura VR & XR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:'Montserrat',sans-serif; }
    #pantalla-inicio {
      position:fixed; inset:0; z-index:999;
      background:radial-gradient(circle at center,#050510 0%,#000 100%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      color:#fff; text-align:center; padding:20px; transition:opacity 1s ease-in-out;
    }
    #pantalla-inicio::before {
      content:''; position:absolute; inset:0;
      background-image:radial-gradient(rgba(255,255,255,0.05) 1px,transparent 1px);
      background-size:50px 50px; opacity:0.3; pointer-events:none;
    }
    #pantalla-inicio h2 { font-size:1.2rem; color:#a0a0ff; margin-bottom:0; font-weight:300; letter-spacing:5px; text-transform:uppercase; }
    #pantalla-inicio h1 { font-family:'Cinzel',serif; font-size:4rem; color:#e0d070; margin-top:0; margin-bottom:0.5rem; letter-spacing:6px; text-shadow:0 0 20px rgba(224,208,112,0.3); }
    #pantalla-inicio p  { color:#bbb; font-size:1.1rem; margin-bottom:2rem; line-height:1.6; max-width:600px; }
    .btn-2d {
      padding:14px 48px; border-radius:50px; font-size:1.1rem; cursor:pointer;
      letter-spacing:3px; transition:all 0.4s ease; margin:8px;
    }
    #btn-pc  { background:rgba(224,208,112,0.05); border:1px solid #e0d070; color:#e0d070; box-shadow:0 0 15px rgba(224,208,112,0.1); }
    #btn-pc:hover  { background:#e0d070; color:#000; box-shadow:0 0 30px rgba(224,208,112,0.6); transform:scale(1.05); }
    #btn-vr  { background:rgba(100,180,255,0.05); border:1px solid #64b4ff; color:#64b4ff; box-shadow:0 0 15px rgba(100,180,255,0.1); }
    #btn-vr:hover  { background:#64b4ff; color:#000; box-shadow:0 0 30px rgba(100,180,255,0.6); transform:scale(1.05); }
    #btn-mr  { background:rgba(64,224,144,0.05);  border:1px solid #40e090; color:#40e090;  box-shadow:0 0 15px rgba(64,224,144,0.1); }
    #btn-mr:hover  { background:#40e090; color:#000; box-shadow:0 0 30px rgba(64,224,144,0.6); transform:scale(1.05); }
    /* Botones nativos de A-Frame: ocultos, solo para que la API WebXR los encuentre */
    #btn-vr-nativo, #btn-ar-nativo { display:none !important; }
  </style>

  <script>
    /* ══════════════════════════════════════════════════════
       ASOCIACIONES: concepto → imagen de tarjeta
    ══════════════════════════════════════════════════════ */
    const ASOCIACIONES = {
      concept_ac:                '#card_ac',
      concept_arco:              '#card_arco',
      concept_bano:              '#card_bano',
      concept_cordon:            '#card_cordon',
      concept_dc:                '#card_dc',
      concept_e6013:             '#card_e6013',
      concept_e7016:             '#card_e7016',
      concept_e7018:             '#card_e7018',
      concept_e7024:             '#card_e7024',
      concept_electrodo:         '#card_electrodo',
      concept_escoria:           '#card_escoria',
      concept_higroscopico:      '#card_higroscopico',
      concept_intensidad:        '#card_intensidad',
      concept_ionizacion:        '#card_ionizacion',
      concept_masa:              '#card_masa',
      concept_penetracion:       '#card_penetracion',
      concept_piqueta:           '#card_piqueta',
      concept_plasma:            '#card_plasma',
      concept_polaridad:         '#card_polaridad',
      concept_polaridad_directa: '#card_polaridad_directa',
      concept_polaridad_inversa: '#card_polaridad_inversa',
      concept_revestimiento:     '#card_revestimiento',
      concept_tension:           '#card_tension',
      concept_wps:               '#card_wps',
      concept_zat:               '#card_zat'
    };

    /* ══════════════════════════════════════════════════════
       COMPONENTE: movimiento-vivo (flotación suave)
    ══════════════════════════════════════════════════════ */
    AFRAME.registerComponent('movimiento-vivo', {
      init: function () {
        this.homePos = new THREE.Vector3().copy(this.el.object3D.position);
        this._tid = null;
        this.siguiente();
      },
      siguiente: function () {
        if (!this.el.parentNode) return;
        var hp = this.homePos;
        var dur = 5000 + Math.random() * 4000;
        this.el.setAttribute('animation__pos', {
          property: 'position',
          to: (hp.x+(Math.random()-.5)*.8)+' '+(hp.y+(Math.random()-.5)*.6)+' '+(hp.z+(Math.random()-.5)*.6),
          dur: dur, easing: 'easeInOutSine'
        });
        this._tid = setTimeout(this.siguiente.bind(this), dur);
      },
      remove: function () { clearTimeout(this._tid); }
    });

    /* ══════════════════════════════════════════════════════
       COMPONENTE: imagen-con-fallback
    ══════════════════════════════════════════════════════ */
    AFRAME.registerComponent('imagen-con-fallback', {
      schema: { texto:{type:'string'}, src:{type:'string'}, w:{type:'number',default:1.2}, h:{type:'number',default:0.4} },
      init: function () {
        var el=this.el, d=this.data;
        var img=document.createElement('a-image');
        img.setAttribute('src', d.src);
        img.setAttribute('width', d.w);
        img.setAttribute('height', d.h);
        img.setAttribute('transparent','true');
        el.appendChild(img);
        var ti=new Image(), ae=document.querySelector(d.src);
        ti.src = ae ? ae.getAttribute('src') : '';
        ti.onerror = function() {
          img.setAttribute('visible','false');
          var t=document.createElement('a-text');
          t.setAttribute('value', d.texto);
          t.setAttribute('align','center');
          t.setAttribute('color','#ffffff');
          t.setAttribute('font','exo2bold');
          t.setAttribute('width','4');
          el.appendChild(t);
        };
      }
    });

    /* ══════════════════════════════════════════════════════
       COMPONENTE: abre-panel
       Escucha click (PC/cursor) en el propio plano.
       El disparo desde mandos lo gestiona 'mando-disparador'
       en el rig, no aquí.
    ══════════════════════════════════════════════════════ */
    AFRAME.registerComponent('abre-panel', {
      schema: { idConcepto: {type:'string'} },
      init: function () {
        var self = this;
        this.el.addEventListener('click', function () { self.abrir(); });
      },
      abrir: function () {
        var cardId = ASOCIACIONES[this.data.idConcepto];
        if (!cardId) return;
        var panel  = document.querySelector('#panel-info');
        var imgEl  = document.querySelector('#card-img');
        var txtEl  = document.querySelector('#panel-txt');
        imgEl.setAttribute('src', cardId);
        var ae = document.querySelector(cardId);
        var ti = new Image();
        ti.src = ae ? ae.getAttribute('src') : '';
        ti.onload = function() { imgEl.setAttribute('visible','true'); if(txtEl) txtEl.setAttribute('visible','false'); };
        ti.onerror = function() {
          imgEl.setAttribute('visible','false');
          if (txtEl) {
            txtEl.setAttribute('visible','true');
            txtEl.setAttribute('value', cardId.replace('#card_','').replace(/_/g,' ').toUpperCase());
          }
        };
        panel.setAttribute('scale','0.01 0.01 0.01');
        panel.setAttribute('visible','true');
        setTimeout(function(){
          panel.setAttribute('animation__abrir','property:scale;from:0.01 0.01 0.01;to:1 1 1;dur:450;easing:easeOutBack');
        },20);
      }
    });

    /* ══════════════════════════════════════════════════════
       COMPONENTE: cierra-panel
    ══════════════════════════════════════════════════════ */
    AFRAME.registerComponent('cierra-panel', {
      init: function () {
        this.el.addEventListener('mouseenter', function() { this.setAttribute('color','#cc3333'); }.bind(this.el));
        this.el.addEventListener('mouseleave', function() { this.setAttribute('color','#992222'); }.bind(this.el));
        this.el.addEventListener('click', function () {
          var p = document.querySelector('#panel-info');
          p.setAttribute('animation__cerrar','property:scale;to:0.01 0.01 0.01;dur:200;easing:easeInBack');
          setTimeout(function(){ p.setAttribute('visible','false'); }, 220);
        });
      }
    });

    /* ══════════════════════════════════════════════════════
       COMPONENTE: control-entorno (VR ↔ MR)
    ══════════════════════════════════════════════════════ */
    AFRAME.registerComponent('control-entorno', {
      schema: { modo:{type:'string'} },
      init: function () {
        var el=this.el, modo=this.data.modo;
        el.addEventListener('mouseenter', function(){ el.setAttribute('scale','1.08 1.08 1.08'); });
        el.addEventListener('mouseleave', function(){ el.setAttribute('scale','1 1 1'); });
        el.addEventListener('click', function () {
          var scene    = document.querySelector('a-scene');
          var estrellas= document.querySelector('#estrellas');
          var btnVR    = document.querySelector('#btn3d-vr');
          var btnMR    = document.querySelector('#btn3d-mr');
          if (modo==='mr') {
            scene.setAttribute('fog','density:0');
            estrellas.setAttribute('visible','false');
            scene.setAttribute('background','transparent:true;color:#000');
            btnVR.setAttribute('color','#111133');
            btnMR.setAttribute('color','#40e090');
            btnVR.querySelector('a-text').setAttribute('color','#ffffff');
            btnMR.querySelector('a-text').setAttribute('color','#000000');
          } else {
            scene.setAttribute('fog','type:exponential;color:#000008;density:0.06');
            estrellas.setAttribute('visible','true');
            scene.setAttribute('background','color:#000005');
            btnVR.setAttribute('color','#e0d070');
            btnMR.setAttribute('color','#111133');
            btnVR.querySelector('a-text').setAttribute('color','#000000');
            btnMR.querySelector('a-text').setAttribute('color','#ffffff');
          }
        });
      }
    });

    /* ══════════════════════════════════════════════════════
       COMPONENTE: btn-mute
    ══════════════════════════════════════════════════════ */
    AFRAME.registerComponent('btn-mute', {
      init: function () {
        var el=this.el, muted=false;
        el.addEventListener('mouseenter', function(){ el.setAttribute('color','#333366'); });
        el.addEventListener('mouseleave', function(){ el.setAttribute('color', muted?'#442222':'#222244'); });
        el.addEventListener('click', function () {
          muted=!muted;
          var audio=document.getElementById('musica-fondo');
          var txt=document.querySelector('#txt-mute');
          if (muted) {
            if(audio) audio.pause();
            txt.setAttribute('value','♪ SILENCIO');
            txt.setAttribute('color','#ff6666');
            el.setAttribute('color','#442222');
          } else {
            if(audio) audio.play().catch(function(){});
            txt.setAttribute('value','♪ MÚSICA');
            txt.setAttribute('color','#a0a0ff');
            el.setAttribute('color','#222244');
          }
        });
      }
    });

    /* ══════════════════════════════════════════════════════
       COMPONENTE: mando-disparador
       ─────────────────────────────────────────────────────
       Se pone en CADA entidad de mando (hand: left / right).
       Cuando el usuario aprieta el gatillo (triggerdown),
       busca qué elemento .interactable está intersectando
       el raycaster de ESE mando y le emite 'click'.
       Esto es la forma correcta en A-Frame 1.5 + Quest 3.
    ══════════════════════════════════════════════════════ */
    AFRAME.registerComponent('mando-disparador', {
      init: function () {
        var el = this.el;
        el.addEventListener('triggerdown', function () {
          var rc = el.components.raycaster;
          if (!rc) return;
          var hits = rc.intersectedEls;
          if (hits && hits.length > 0) {
            // Emitimos click en el elemento más cercano
            hits[0].emit('click', {}, true);
          }
        });
        // mouseenter/leave para feedback visual del hover via raycaster
        el.addEventListener('raycaster-intersection', function (e) {
          e.detail.els.forEach(function(hit){
            hit.emit('mouseenter',{},true);
          });
        });
        el.addEventListener('raycaster-intersection-cleared', function (e) {
          e.detail.clearedEls.forEach(function(hit){
            hit.emit('mouseleave',{},true);
          });
        });
      }
    });
  </script>
</head>
<body>

<!-- ══ PANTALLA DE BIENVENIDA 2D ══ -->
<div id="pantalla-inicio">
  <h2>MÓDULO SAN</h2>
  <h1>ÓRBITA SAN</h1>
  <p>Glosario interactivo de Soldadura en Atmósfera Natural.<br>
  <small style="font-size:0.85rem;color:#888;display:inline-block;margin-top:8px;">
    Mandos Quest 3: apunta con el haz y aprieta el gatillo.<br>
    PC: mueve el ratón sobre las palabras y haz clic.
  </small></p>
  <button class="btn-2d" id="btn-pc" onclick="iniciarPC()">ENTRAR (PC)</button>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px;">
    <button class="btn-2d" id="btn-vr" onclick="iniciarVR()">◎ ENTRAR EN VR</button>
    <button class="btn-2d" id="btn-mr" onclick="iniciarMR()">◈ ENTRAR EN MR</button>
  </div>
</div>

<!-- Botones nativos de A-Frame (ocultos, requeridos por la API WebXR) -->
<button id="btn-vr-nativo"></button>
<button id="btn-ar-nativo"></button>

<!-- ══ ESCENA A-FRAME ══
     renderer alpha:true  → passthrough transparente en MR
     webxr: local-floor requerido; hand-tracking y layers opcionales
     xr-mode-ui apunta a los botones ocultos para que A-Frame
     gestione la sesión WebXR sin mostrar su UI genérica
════════════════════════════════════════════════════════ -->
<a-scene
  background="color:#000005"
  fog="type:exponential;color:#000008;density:0.06"
  renderer="antialias:true;colorManagement:true;alpha:true;"
  webxr="requiredFeatures:local-floor;optionalFeatures:hand-tracking,bounded-floor,layers"
  xr-mode-ui="enabled:true;enterVRButton:#btn-vr-nativo;enterARButton:#btn-ar-nativo">

  <a-assets timeout="15000">
    <!-- Tarjetas explicativas -->
    <img id="card_ac"                src="./ac.png">
    <img id="card_arco"              src="./arco-electrico.png">
    <img id="card_bano"              src="./bano-de-fusion.png">
    <img id="card_cordon"            src="./cordon.png">
    <img id="card_dc"                src="./dc.png">
    <img id="card_e6013"             src="./e6013.png">
    <img id="card_e7016"             src="./e7016.png">
    <img id="card_e7018"             src="./e7018.png">
    <img id="card_e7024"             src="./e7024.png">
    <img id="card_electrodo"         src="./electrodo.png">
    <img id="card_escoria"           src="./escoria.png">
    <img id="card_higroscopico"      src="./higroscopico.png">
    <img id="card_intensidad"        src="./intensidad-de-corriente.png">
    <img id="card_ionizacion"        src="./ionizacion.png">
    <img id="card_masa"              src="./masa.png">
    <img id="card_penetracion"       src="./penetracion.png">
    <img id="card_piqueta"           src="./piqueta.png">
    <img id="card_plasma"            src="./plasma.png">
    <img id="card_polaridad"         src="./polaridad.png">
    <img id="card_polaridad_directa" src="./polaridad-directa-dcminus.png">
    <img id="card_polaridad_inversa" src="./polaridad-inversa-dcplus.png">
    <img id="card_revestimiento"     src="./revestimiento.png">
    <img id="card_tension"           src="./tension.png">
    <img id="card_wps"               src="./wps.png">
    <img id="card_zat"               src="./zat.png">
    <!-- Términos flotantes -->
    <img id="term_ac"                src="./termino_ac.png">
    <img id="term_arco"              src="./termino_arco-electrico.png">
    <img id="term_bano"              src="./termino_bano-de-fusion.png">
    <img id="term_cordon"            src="./termino_cordon.png">
    <img id="term_dc"                src="./termino_dc.png">
    <img id="term_e6013"             src="./termino_e6013.png">
    <img id="term_e7016"             src="./termino_e7016.png">
    <img id="term_e7018"             src="./termino_e7018.png">
    <img id="term_e7024"             src="./termino_e7024.png">
    <img id="term_electrodo"         src="./termino_electrodo.png">
    <img id="term_escoria"           src="./termino_escoria.png">
    <img id="term_higroscopico"      src="./termino_higroscopico.png">
    <img id="term_intensidad"        src="./termino_intensidad-de-corriente.png">
    <img id="term_ionizacion"        src="./termino_ionizacion.png">
    <img id="term_masa"              src="./termino_masa.png">
    <img id="term_penetracion"       src="./termino_penetracion.png">
    <img id="term_piqueta"           src="./termino_piqueta.png">
    <img id="term_plasma"            src="./termino_plasma.png">
    <img id="term_polaridad"         src="./termino_polaridad.png">
    <img id="term_polaridad_directa" src="./termino_polaridad-directa-dcminus.png">
    <img id="term_polaridad_inversa" src="./termino_polaridad-inversa-dcplus.png">
    <img id="term_revestimiento"     src="./termino_revestimiento.png">
    <img id="term_tension"           src="./termino_tension.png">
    <img id="term_wps"               src="./termino_wps.png">
    <img id="term_zat"               src="./termino_zat.png">
    <!-- Audio -->
    <audio id="musica-fondo" src="./orbitaSAN.mp3" loop preload="auto"></audio>
    <!-- Fallback 1×1 transparente -->
    <img id="fallback" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
  </a-assets>

  <!-- Luces -->
  <a-light type="ambient" color="#111122"></a-light>
  <a-light type="point" position="0 5 0" color="#5555aa" intensity="0.6"></a-light>

  <!-- Campo estelar (120 esferas, reducido para GPU Quest) -->
  <a-entity id="estrellas"></a-entity>

  <!-- ══════════════════════════════════════════════════
       RIG PRINCIPAL
       ─────────────────────────────────────────────────
       Todo lo que debe seguir al usuario (nube de términos,
       panel de info, consolas de control) es HIJO del rig.
       Así el origen siempre coincide con la posición física
       del visitante, independientemente de dónde esté en
       su habitación con local-floor.
  ══════════════════════════════════════════════════════ -->
  <a-entity id="rig" position="0 0 0">

    <!-- Cámara con cursor para PC -->
    <a-camera position="0 1.6 0" wasd-controls look-controls>
      <a-cursor
        id="cursor-pc"
        raycaster="objects:.interactable;far:20;rayOrigin:mouse"
        material="color:#e0d070;shader:flat;opacity:0.8"
        geometry="primitive:ring;radiusInner:0.008;radiusOuter:0.013"
        fuse="false">
      </a-cursor>
    </a-camera>

    <!-- Mando izquierdo -->
    <a-entity
      laser-controls="hand:left"
      raycaster="objects:.interactable;far:12;showLine:true"
      line="color:#6688ff;opacity:0.6"
      mando-disparador>
    </a-entity>

    <!-- Mando derecho -->
    <a-entity
      laser-controls="hand:right"
      raycaster="objects:.interactable;far:12;showLine:true"
      line="color:#e0d070;opacity:0.6"
      mando-disparador>
    </a-entity>

    <!-- ══ PANEL DE INFORMACIÓN (se abre al pulsar un término) ══
         Posición fija delante del usuario: Y=1.6 (altura de ojos), Z=-1.8 -->
    <a-entity id="panel-info" position="0 1.6 -1.8" scale="1 1 1" visible="false">
      <a-plane width="2.40" height="1.44" color="#000" opacity="0.85" material="shader:flat">
        <a-plane width="2.44" height="1.48" color="#e0d070" position="0 0 -0.01" opacity="0.3" material="shader:flat"></a-plane>
        <a-image id="card-img" src="#fallback" width="2.38" height="1.42"
                 position="0 0 0.01" material="shader:flat;transparent:true;"></a-image>
        <a-text id="panel-txt" value="" visible="false" align="center"
                color="#ffffff" width="2.0" position="0 0.1 0.02" font="exo2bold"></a-text>
        <!-- Botón cerrar -->
        <a-plane class="interactable" cierra-panel
                 width="0.6" height="0.18" color="#992222" position="0 -0.85 0.02">
          <a-text value="✕ CERRAR" font="exo2bold" align="center" color="#ffffff" width="2.0" position="0 0 0.01"></a-text>
        </a-plane>
      </a-plane>
    </a-entity>

    <!-- ══ CONSOLA DE ENTORNO (VR / MR) + MUTE ══
         Anclada al rig: siempre visible a la izquierda del usuario -->
    <a-entity position="-0.9 0.8 -1.3" rotation="-25 35 0">
      <!-- Panel entorno -->
      <a-plane width="0.85" height="0.58" color="#000" opacity="0.95" material="shader:flat">
        <a-plane width="0.88" height="0.61" color="#e0d070" position="0 0 -0.01" opacity="0.25" material="shader:flat"></a-plane>
        <a-text value="ENTORNO" font="exo2bold" align="center" color="#e0d070" width="2.0" position="0 0.18 0.01"></a-text>
        <a-plane id="btn3d-vr" class="interactable" control-entorno="modo:vr"
                 width="0.72" height="0.12" color="#e0d070" position="0 0.03 0.02" material="shader:flat">
          <a-text value="VR ESPACIO" font="exo2bold" align="center" color="#000" width="1.7"></a-text>
        </a-plane>
        <a-plane id="btn3d-mr" class="interactable" control-entorno="modo:mr"
                 width="0.72" height="0.12" color="#111133" position="0 -0.12 0.02" material="shader:flat">
          <a-text value="MR MIXTA" font="exo2bold" align="center" color="#fff" width="1.7"></a-text>
        </a-plane>
      </a-plane>
      <!-- Botón mute justo debajo -->
      <a-plane class="interactable" btn-mute
               width="0.72" height="0.12" color="#222244" position="0 -0.42 0.02" material="shader:flat">
        <a-plane width="0.75" height="0.15" color="#a0a0ff" position="0 0 -0.01" opacity="0.2" material="shader:flat"></a-plane>
        <a-text id="txt-mute" value="♪ MÚSICA" font="exo2bold" align="center" color="#a0a0ff" width="1.7" position="0 0 0.01"></a-text>
      </a-plane>
    </a-entity>

    <!-- ══ NUBE DE TÉRMINOS ══
         También hija del rig → orbita ALREDEDOR del usuario.
         Radio ~3.2 m, términos entre Y=1.0 y Y=2.3 (altura cómoda en VR).

<script>
  /* ── Audio ── */
  function reproducirAudio() {
    var a = document.getElementById('musica-fondo');
    if (a) { a.volume = 0.45; a.play().catch(function(){}); }
  }

  /* ── Mostrar nube ── */
  function mostrarNube() {
    document.getElementById('nube-palabras').setAttribute('visible','true');
  }

  /* ── Cursor PC: desactivar en VR, reactivar al salir ── */
  var scene = document.querySelector('a-scene');
  scene.addEventListener('enter-vr', function () {
    var c = document.querySelector('#cursor-pc');
    if (c) c.setAttribute('visible','false');
    document.getElementById('pantalla-inicio').style.display = 'none';
    mostrarNube();
    reproducirAudio();
    /* Auto MR si el visor negocia sesión AR */
    if (scene.is('ar-mode')) {
      scene.setAttribute('fog','density:0');
      document.querySelector('#estrellas').setAttribute('visible','false');
      scene.setAttribute('background','transparent:true;color:#000');
      document.querySelector('#btn3d-vr').setAttribute('color','#111133');
      document.querySelector('#btn3d-mr').setAttribute('color','#40e090');
      document.querySelector('#btn3d-vr').querySelector('a-text').setAttribute('color','#ffffff');
      document.querySelector('#btn3d-mr').querySelector('a-text').setAttribute('color','#000000');
    }
  });
  scene.addEventListener('exit-vr', function () {
    var c = document.querySelector('#cursor-pc');
    if (c) c.setAttribute('visible','true');
  });

  /* ── Botones pantalla de bienvenida ── */
  function iniciarPC() {
    var p = document.getElementById('pantalla-inicio');
    p.style.opacity = '0';
    reproducirAudio();
    setTimeout(function(){ p.style.display='none'; mostrarNube(); }, 1000);
  }
  function iniciarVR() {
    iniciarPC();
    setTimeout(function(){ scene.enterVR(); }, 500);
  }
  function iniciarMR() {
    iniciarPC();
    setTimeout(function(){
      if (scene.enterAR) { scene.enterAR(); } else { scene.enterVR(); }
    }, 500);
  }

  /* ── Estrellas (120, alivia GPU Quest) ── */
  window.addEventListener('load', function () {
    var c = document.getElementById('estrellas');
    for (var i=0; i<120; i++) {
      var e = document.createElement('a-sphere');
      var r = 25+Math.random()*10, t = Math.random()*Math.PI*2, p2 = Math.random()*Math.PI;
      e.setAttribute('position',
        (r*Math.sin(p2)*Math.cos(t))+' '+(r*Math.cos(p2))+' '+(r*Math.sin(p2)*Math.sin(t)));
      e.setAttribute('radius', 0.02+Math.random()*0.04);
      e.setAttribute('material','color:#ffffff;shader:flat');
      c.appendChild(e);
    }
  });
</script>
