<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Órbita SAN - Soldadura VR & XR</title>
  
  <!-- Librería de A-Frame VR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- Google Fonts para la pantalla de bienvenida 2D -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; }
    #pantalla-inicio { position: fixed; inset: 0; z-index: 999; background: radial-gradient(circle at center, #050510 0%, #000000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; padding: 20px; transition: opacity 1s ease-in-out; }
    #pantalla-inicio::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.3; pointer-events: none; }
    
    #pantalla-inicio h2 { font-size: 1.2rem; color: #a0a0ff; margin-bottom: 0; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; }
    #pantalla-inicio h1 { font-family: 'Cinzel', serif; font-size: 4rem; color: #e0d070; margin-top: 0; margin-bottom: 0.5rem; letter-spacing: 6px; text-shadow: 0 0 20px rgba(224, 208, 112, 0.3); }
    #pantalla-inicio p { color: #bbb; font-size: 1.1rem; margin-bottom: 3rem; line-height: 1.6; max-width: 600px; }
    
    #btn-entrar { padding: 16px 56px; background: rgba(224, 208, 112, 0.05); border: 1px solid #e0d070; border-radius: 50px; color: #e0d070; font-size: 1.2rem; cursor: pointer; letter-spacing: 3px; transition: all 0.4s ease; box-shadow: 0 0 15px rgba(224, 208, 112, 0.1); }
    #btn-entrar:hover { background: #e0d070; color: #000; box-shadow: 0 0 30px rgba(224, 208, 112, 0.6); transform: scale(1.05); }
  </style>

  <script>
    // Diccionario de conceptos con ortografía y explicaciones impecables en Español
    const DICCIONARIO_SAN = {
      'concept_ac': {
        titulo: 'Corriente Alterna (AC)',
        desc: 'Corriente eléctrica en la que la dirección del flujo de electrones\ncambia periódicamente. Muy útil en soldadura TIG de aluminio\nya que ayuda a romper la resistente capa de óxido superficial.'
      },
      'concept_arco': {
        titulo: 'Arco Eléctrico',
        desc: 'Descarga eléctrica continua a través de una columna de gas ionizado\nentre el electrodo y la pieza. Genera el intenso calor necesario\npara fundir los metales y realizar la unión.'
      },
      'concept_bano': {
        titulo: 'Baño de Fusión',
        desc: 'Zona de metal líquido creada por el calor del arco eléctrico.\nEs donde se mezclan el metal base y el de aportación.\nRequiere protección constante para evitar la contaminación atmosférica.'
      },
      'concept_cordon': {
        titulo: 'Cordón de Soldadura',
        desc: 'La junta metálica resultante tras el paso del arco y la\nsolidificación del baño de fusión. Sus características mecánicas\ndependen de la velocidad, técnica y materiales utilizados.'
      },
      'concept_dc': {
        titulo: 'Corriente Continua (DC)',
        desc: 'Flujo constante de electrones en una sola dirección.\nOfrece un arco muy estable y uniforme. Es el tipo de corriente\nmás utilizado en soldadura por arco manual (SMAW).'
      },
      'concept_e6013': {
        titulo: 'Electrodo E6013',
        desc: 'Electrodo con revestimiento de rutilo de fácil manejo.\nProduce un arco suave, pocas salpicaduras y escoria fácil de retirar.\nIdeal para chapas finas y trabajos generales de carpintería metálica.'
      },
      'concept_e7016': {
        titulo: 'Electrodo E7016',
        desc: 'Electrodo de bajo hidrógeno (básico) diseñado para soldadura\nen todas las posiciones. Ofrece excelentes propiedades mecánicas\ny alta resistencia al agrietamiento.'
      },
      'concept_e7018': {
        titulo: 'Electrodo E7018',
        desc: 'Electrodo básico con polvo de hierro en su revestimiento.\nOfrece una alta velocidad de depósito, excelentes propiedades al impacto\ny una soldadura de calidad radiográfica.'
      },
      'concept_e7024': {
        titulo: 'Electrodo E7024',
        desc: 'Electrodo de rutilo con alto contenido de polvo de hierro.\nDiseñado para soldar a alta velocidad en posición plana y filete horizontal,\ncon un gran rendimiento de depósito.'
      },
      'concept_electrodo': {
        titulo: 'Electrodo',
        desc: 'Varilla metálica que conduce la corriente para cebar el arco.\nEn SMAW, el electrodo revestido se consume para aportar el metal\nde unión y proveer gases protectores.'
      },
      'concept_escoria': {
        titulo: 'Escoria',
        desc: 'Capa vitrificada que flota sobre el baño de fusión y se solidifica\nencima del cordón. Protege el metal caliente del oxígeno atmosférico\ny debe retirarse una vez enfriado.'
      },
      'concept_higroscopico': {
        titulo: 'Higroscópico',
        desc: 'Propiedad de ciertos materiales, como los electrodos básicos (E7018),\nde absorber humedad del aire. Requieren ser almacenados en hornos\npara evitar defectos como poros o fisuras por hidrógeno.'
      },
      'concept_intensidad': {
        titulo: 'Intensidad de Corriente',
        desc: 'La cantidad de flujo de corriente (Amperios) que circula por el arco.\nEs el parámetro principal que controla el calor aportado, la penetración\ny la tasa de fusión del electrodo.'
      },
      'concept_ionizacion': {
        titulo: 'Ionización',
        desc: 'Proceso por el cual los átomos del gas protector pierden o ganan\nelectrones, permitiendo el paso de corriente eléctrica. Es vital\npara establecer y mantener la estabilidad del arco.'
      },
      'concept_masa': {
        titulo: 'Conexión de Masa',
        desc: 'Cable y pinza que conectan la pieza de trabajo a la fuente de soldadura\npara cerrar el circuito eléctrico. Una mala conexión puede causar\ninestabilidad del arco o soplo magnético.'
      },
      'concept_penetracion': {
        titulo: 'Penetración',
        desc: 'La profundidad a la que el metal fundido se extiende dentro de la\njunta o del metal base. Es crucial para garantizar la resistencia\nmecánica y la integridad de la unión soldada.'
      },
      'concept_piqueta': {
        titulo: 'Piqueta',
        desc: 'Herramienta manual metálica con extremos en punta y cincel.\nSe utiliza para retirar por golpeo la escoria sólida que cubre\nel cordón de soldadura recién ejecutado.'
      },
      'concept_plasma': {
        titulo: 'Plasma',
        desc: 'El cuarto estado de la materia. Consiste en un gas altamente ionizado\na temperaturas extremas que conduce la corriente eléctrica,\nformando la columna central del arco de soldadura.'
      },
      'concept_polaridad': {
        titulo: 'Polaridad',
        desc: 'Establece la conexión de los cables (+ o -) en corriente continua.\nDetermina la distribución del calor: aproximadamente un 70% del calor\nse concentra en el polo positivo.'
      },
      'concept_polaridad_directa': {
        titulo: 'Polaridad Directa (DC-)',
        desc: 'El electrodo se conecta al polo negativo (-) y la pieza al positivo (+).\nConcentra el calor en la pieza, logrando una mayor penetración\ny un menor desgaste del electrodo.'
      },
      'concept_polaridad_inversa': {
        titulo: 'Polaridad Inversa (DC+)',
        desc: 'El electrodo se conecta al polo positivo (+) y la pieza al negativo (-).\nConcentra más calor en el electrodo, ideal para soldaduras rápidas,\nchapas finas o pasadas de raíz.'
      },
      'concept_revestimiento': {
        titulo: 'Revestimiento',
        desc: 'Capa química que cubre el núcleo del electrodo. Al quemarse,\ngenera gases protectores, forma la escoria limpiadora, estabiliza\nel arco y puede aportar elementos de aleación.'
      },
      'concept_tension': {
        titulo: 'Tensión (Voltaje)',
        desc: 'Parámetro eléctrico que mide la fuerza que impulsa los electrones.\nEn soldadura, el voltaje determina principalmente la longitud del arco\ny el ancho del cordón depositado.'
      },
      'concept_wps': {
        titulo: 'WPS (Especificación)',
        desc: 'Welding Procedure Specification. Documento técnico que detalla las\nvariables requeridas (corriente, materiales, preparación, etc.)\npara realizar una soldadura de calidad aprobada.'
      },
      'concept_zat': {
        titulo: 'ZAT (Zona Afectada)',
        desc: 'Región del metal base que no llega a fundirse, pero cuya microestructura\ny propiedades mecánicas se alteran por el intenso calor del arco.\nSuele ser la zona más crítica ante fallos mecánicos.'
      }
    };

    // Componente de oscilación y flotación sutil e independiente
    AFRAME.registerComponent('movimiento-vivo', {
      init: function () {
        this.homePos = new THREE.Vector3().copy(this.el.object3D.position);
        this.proximoDestino();
      },
      proximoDestino: function () {
        const el = this.el;
        if (!el) return;
        
        // Desplazamiento sutil e independiente en ejes X, Y y Z
        const targetX = this.homePos.x + (Math.random() - 0.5) * 0.8;
        const targetY = this.homePos.y + (Math.random() - 0.5) * 0.6;
        const targetZ = this.homePos.z + (Math.random() - 0.5) * 0.6;
        const duracion = 5000 + Math.random() * 4000;

        el.setAttribute('animation__pos', {
          property: 'position',
          to: `${targetX} ${targetY} ${targetZ}`,
          dur: duracion,
          easing: 'easeInOutSine'
        });
        
        setTimeout(() => { if (this.el) this.proximoDestino(); }, duracion);
      }
    });

    // Componente de renderizado de texto 100% nítido, nativo de WebGL mediante Canvas local
    AFRAME.registerComponent('canvas-termino', {
      schema: {
        texto: {type: 'string', default: ''}
      },
      init: function () {
        this.canvas = document.createElement('canvas');
        this.canvas.width = 512;
        this.canvas.height = 128;
        this.ctx = this.canvas.getContext('2d');
        
        // Asignamos la textura nativa de A-Frame apuntando a este canvas
        this.el.setAttribute('material', {
          src: this.canvas,
          transparent: true,
          shader: 'flat',
          side: 'double'
        });
      },
      update: function () {
        const ctx = this.ctx;
        if (!ctx) return;

        ctx.clearRect(0, 0, 512, 128);

        // Borde dorado de diseño
        ctx.strokeStyle = '#e0d070';
        ctx.lineWidth = 4;
        ctx.strokeRect(8, 8, 496, 112);

        // Fondo oscuro del término
        ctx.fillStyle = 'rgba(5, 5, 15, 0.85)';
        ctx.fillRect(10, 10, 492, 108);

        // Escribir el concepto en perfecta ortografía
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 36px Montserrat, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.data.texto, 256, 64);

        // Forzar actualización de la textura en el motor de renderizado
        var map = this.el.getObject3D('mesh')?.material?.map;
        if (map) {
          map.needsUpdate = true;
        } else {
          this.el.addEventListener('object3dset', () => {
            var map2 = this.el.getObject3D('mesh')?.material?.map;
            if (map2) map2.needsUpdate = true;
          });
        }
      }
    });

    // Componente que dibuja de forma instantánea en un Canvas 2D local las fichas explicativas de texto
    AFRAME.registerComponent('canvas-tarjeta', {
      schema: {
        titulo: {type: 'string', default: ''},
        desc: {type: 'string', default: ''}
      },
      init: function () {
        this.canvas = document.createElement('canvas');
        this.canvas.width = 1024;
        this.canvas.height = 512;
        this.ctx = this.canvas.getContext('2d');
        
        this.el.setAttribute('material', {
          src: this.canvas,
          transparent: true,
          shader: 'flat',
          side: 'double'
        });
      },
      update: function () {
        const ctx = this.ctx;
        if (!ctx) return;

        // Limpiar lienzo
        ctx.clearRect(0, 0, 1024, 512);

        // Fondo de tarjeta oscuro futurista
        ctx.fillStyle = '#05050f';
        ctx.fillRect(0, 0, 1024, 512);

        // Borde dorado SAN
        ctx.strokeStyle = '#e0d070';
        ctx.lineWidth = 8;
        ctx.strokeRect(15, 15, 994, 482);

        // Título de la tarjeta
        ctx.fillStyle = '#e0d070';
        ctx.font = 'bold 44px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(this.data.titulo, 512, 50);

        // Línea divisoria elegante
        ctx.strokeStyle = '#e0d070';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(120, 120);
        ctx.lineTo(904, 120);
        ctx.stroke();

        // Descripción con salto de línea interpretado perfectamente
        ctx.fillStyle = '#ffffff';
        ctx.font = '32px sans-serif';
        ctx.textBaseline = 'top';
        
        const lines = this.data.desc.split('\n');
        let y = 160;
        lines.forEach(line => {
          ctx.fillText(line, 512, y);
          y += 45;
        });

        var map = this.el.getObject3D('mesh')?.material?.map;
        if (map) {
          map.needsUpdate = true;
        } else {
          this.el.addEventListener('object3dset', () => {
            var map2 = this.el.getObject3D('mesh')?.material?.map;
            if (map2) map2.needsUpdate = true;
          });
        }
      }
    });

    // Generador automático tridimensional de la nube de 25 conceptos
    AFRAME.registerComponent('generar-nube', {
      init: function () {
        const container = this.el;
        const radius = 3.2;
        const total = Object.keys(DICCIONARIO_SAN).length;
        const step = (Math.PI * 2) / total;

        let i = 0;
        for (const [key, val] of Object.entries(DICCIONARIO_SAN)) {
          const angle = i * step;
          const x = radius * Math.sin(angle);
          const z = -radius * Math.cos(angle);
          const y = 1.3 + (i % 3) * 0.35; // Alturas alternas para evitar superposiciones

          // Ángulo de rotación para mirar al centro exacto del usuario (0, 0)
          const rotY = -(angle * 180 / Math.PI);

          const wrapper = document.createElement('a-entity');
          wrapper.setAttribute('movimiento-vivo', '');
          wrapper.setAttribute('position', `${x} ${y} ${z}`);
          wrapper.setAttribute('rotation', `0 ${rotY} 0`);

          // Plano nativo para renderizar la textura generada localmente
          const plane = document.createElement('a-plane');
          plane.setAttribute('width', '1.2');
          plane.setAttribute('height', '0.4');
          plane.setAttribute('canvas-termino', { texto: val.titulo.split(' (') }); // Título resumido para el óvalo flotante

          // Hitbox transparente ampliada para facilitar la selección con el láser
          const collider = document.createElement('a-plane');
          collider.setAttribute('class', 'interactable');
          collider.setAttribute('palabra-interactiva', { idConcepto: key });
          collider.setAttribute('width', '1.4');
          collider.setAttribute('height', '0.6');
          collider.setAttribute('material', 'opacity: 0; transparent: true');
          collider.setAttribute('position', '0 0 0.01');

          wrapper.appendChild(plane);
          wrapper.appendChild(collider);
          container.appendChild(wrapper);

          i++;
        }
      }
    });

    // Componente de control interactivo para abrir los conceptos al apuntar y hacer clic
    AFRAME.registerComponent('palabra-interactiva', {
      schema: { idConcepto: {type: 'string'} },
      init: function () {
        var el = this.el;
        var data = this.data;

        // Efecto Hover: Resaltar en dorado de manera interactiva
        el.addEventListener('mouseenter', function () {
          var parent = el.parentNode;
          var plane = parent.querySelector('a-plane[canvas-termino]');
          if (plane) {
            plane.setAttribute('scale', '1.15 1.15 1.15');
          }
        });

        // Efecto Leave: Restaurar estado original
        el.addEventListener('mouseleave', function () {
          var parent = el.parentNode;
          var plane = parent.querySelector('a-plane[canvas-termino]');
          if (plane) {
            plane.setAttribute('scale', '1 1 1');
          }
        });

        // Selección: Mostrar información explicativa en el panel frontal
        el.addEventListener('click', function () {
          var asociacion = DICCIONARIO_SAN[data.idConcepto];
          if (!asociacion) return;

          var panel = document.querySelector('#panel-info-dinamico');
          
          // Actualizar el Canvas explicativo con el título y la descripción
          panel.setAttribute('canvas-tarjeta', {
            titulo: asociacion.titulo,
            desc: asociacion.desc
          });
          
          panel.setAttribute('visible', 'true');
          panel.setAttribute('animation__abrir', 'property: scale; from: 0.01 0.01 0.01; to: 1 1 1; dur: 450; easing: easeOutBack');
        });
      }
    });

    // Componente para alternar entre el modo VR (Cielo espacial) e XR (Passthrough/Mixto)
    AFRAME.registerComponent('control-entorno', {
      schema: { modo: {type: 'string'} },
      init: function () {
        var el = this.el;
        var modo = this.data.modo;

        el.addEventListener('mouseenter', function () {
          el.setAttribute('scale', '1.1 1.1 1.1');
        });
        el.addEventListener('mouseleave', function () {
          el.setAttribute('scale', '1 1 1');
        });

        el.addEventListener('click', function () {
          var scene = document.querySelector('a-scene');
          var estrellas = document.querySelector('#estrellas');
          var btnVR = document.querySelector('#btn-vr-active');
          var btnXR = document.querySelector('#btn-xr-active');

          if (modo === 'xr') {
            scene.setAttribute('fog', 'density: 0');
            estrellas.setAttribute('visible', 'false');
            scene.setAttribute('background', 'transparent: true; color: #000');
            
            btnVR.setAttribute('color', '#111122');
            btnXR.setAttribute('color', '#e0d070');
            btnVR.querySelector('a-text').setAttribute('color', '#ffffff');
            btnXR.querySelector('a-text').setAttribute('color', '#000000');
          } else {
            scene.setAttribute('fog', 'type: exponential; color: #000008; density: 0.06');
            estrellas.setAttribute('visible', 'true');
            scene.setAttribute('background', 'color: #000005');
            
            btnVR.setAttribute('color', '#e0d070');
            btnXR.setAttribute('color', '#111122');
            btnVR.querySelector('a-text').setAttribute('color', '#000000');
            btnXR.querySelector('a-text').setAttribute('color', '#ffffff');
          }
        });
      }
    });
  </script>
</head>
<body>

<!-- Pantalla de Bienvenida (Capa 2D) -->
<div id="pantalla-inicio">
  <h2>MÓDULO SAN</h2>
  <h1>ÓRBITA SAN</h1>
  <p>Glosario de Soldadura en Atmósfera Natural interactivo.<br>
  <small style="font-size: 0.85rem; color:#888; margin-top:10px; display:inline-block;">Apunta a las palabras flotantes y pulsa el gatillo de tus mandos de Meta Quest 3 o haz clic en PC.</small></p>
  <button id="btn-entrar" onclick="iniciar()">ENTRAR</button>
</div>

<!-- Escena VR de A-Frame libre de bloqueos de assets -->
<a-scene background="color:#000005" 
         fog="type: exponential; color: #000008; density: 0.06" 
         renderer="antialias: true; colorManagement: true;"
         webxr="referenceSpaceType: localFloor; optionalFeatures: pass-through;"
         cursor="rayOrigin: mouse"
         raycaster="objects: .interactable; interval: 100">
  
  <!-- Luces estéticas de ambiente y apoyo -->
  <a-light type="ambient" color="#111122"></a-light>
  <a-light type="point" position="0 5 0" color="#5555aa" intensity="0.6"></a-light>
  
  <!-- Espacio estelar dinámico -->
  <a-entity id="estrellas"></a-entity>

  <!-- PANEL DE SELECCIÓN DE ENTORNO DISCRETO (VR vs XR) -->
  <a-entity id="consola-entorno" position="-1.0 0.7 -1.2" rotation="-40 40 0">
    <a-plane width="0.9" height="0.6" color="#000" opacity="0.95" material="shader:flat">
      <a-plane width="0.93" height="0.63" color="#e0d070" position="0 0 -0.01" opacity="0.3" material="shader:flat"></a-plane>
      <a-text value="ENTORNO" font="exo2bold" align="center" color="#e0d070" width="2.2" position="0 0.20 0.01"></a-text>
      
      <!-- Botón Modo VR -->
      <a-plane id="btn-vr-active" class="interactable" control-entorno="modo: vr" width="0.75" height="0.13" color="#e0d070" position="0 0.04 0.02" material="shader:flat">
        <a-text value="VR ESPACIO" font="exo2bold" align="center" color="#000" width="1.8"></a-text>
      </a-plane>

      <!-- Botón Modo XR -->
      <a-plane id="btn-xr-active" class="interactable" control-entorno="modo: xr" width="0.75" height="0.13" color="#111122" position="0 -0.13 0.02" material="shader:flat">
        <a-text value="XR MIXTA" font="exo2bold" align="center" color="#fff" width="1.8"></a-text>
      </a-plane>
    </a-plane>
  </a-entity>

  <!-- NUBE DE TÉRMINOS FLOTANTES EN 360 GRADOS (Generado de forma automática por JS) -->
  <a-entity id="nube-palabras" generar-nube position="0 0 0" visible="false" animation="property: rotation; to: 0 360 0; loop: true; dur: 85000; easing: linear"></a-entity>

  <!-- PANEL DE EXPLICACIÓN DETALLADA (Frente al Usuario - Generado de forma dinámica mediante Canvas) -->
  <!-- Modificado a <a-plane> para que tenga geometría física y renderice el material correctamente -->
  <a-plane id="panel-info-dinamico" 
           width="2.4" 
           height="1.2" 
           canvas-tarjeta="titulo: BIENVENIDO; desc: Selecciona un término flotante en la órbita\npara visualizar su ficha explicativa completa." 
           position="0 1.6 -1.8" 
           scale="0.01 0.01 0.01" 
           visible="false">
    
    <!-- Botón de Cierre interactivo (Ajustada su posición para que sobresalga elegantemente en el borde inferior) -->
    <a-plane class="interactable" 
             width="0.6" 
             height="0.18" 
             color="#992222" 
             position="0 -0.72 0.02"
             animation__hover="property: scale; to: 1.1 1.1 1.1; dur: 150; startEvents: mouseenter"
             animation__leave="property: scale; to: 1 1 1; dur: 150; startEvents: mouseleave"
             onclick="document.querySelector('#panel-info-dinamico').setAttribute('visible', 'false')">
      <a-text value="CERRAR" font="exo2bold" align="center" color="#ffffff" width="2.2" position="0 0.01 0.01"></a-text>
    </a-plane>
  </a-plane>

  <!-- RIG DE CÁMARA Y MANDOS QUEST 3 (Configuración completa de controles) -->
  <a-entity id="rig">
    <a-camera position="0 1.6 0" wasd-controls look-controls="pointerLockEnabled: false"></a-camera>
    <a-entity laser-controls="hand:left" raycaster="objects: .interactable; far:10; showLine: true" line="color: #4444aa; opacity: 0.5"></a-entity>
    <a-entity id="control-derecho" laser-controls="hand:right" raycaster="objects: .interactable; far:10; showLine: true" line="color: #e0d070; opacity: 0.5"></a-entity>
  </a-entity>

</a-scene>

<script>
  // Inicialización de música de fondo y desvanecimiento de la pantalla de carga
  var musica = null;
  function iniciar() {
    document.getElementById('pantalla-inicio').style.opacity = '0';
    
    // Cargar e iniciar audio de forma totalmente asíncrona mediante JS nativo
    if (!musica) {
      musica = new Audio('./orbitaSAN.mp3');
      musica.loop = true;
      musica.volume = 0.45;
    }
    musica.play().catch(e => console.log("Audio esperando interacción del navegador."));

    setTimeout(() => { 
      document.getElementById('pantalla-inicio').style.display = 'none';
      document.getElementById('nube-palabras').setAttribute('visible', 'true');
    }, 1000);
  }

  // Generador estético de campo de estrellas 3D
  function crearEstrellas() {
    const contenedor = document.getElementById('estrellas');
    for (let i = 0; i < 250; i++) {
      const e = document.createElement('a-sphere');
      const r = 25 + Math.random() * 10;
      const t = Math.random() * Math.PI * 2;
      const p = Math.random() * Math.PI;
      e.setAttribute('position', `${r * Math.sin(p) * Math.cos(t)} ${r * Math.cos(p)} ${r * Math.sin(p) * Math.sin(t)}`);
      e.setAttribute('radius', 0.02 + Math.random() * 0.04);
      e.setAttribute('material', 'color: #ffffff; shader: flat');
      contenedor.appendChild(e);
    }
  }

  // Acceso inmediato si el visor Meta Quest 3 inicia directo en modo VR/XR
  document.querySelector('a-scene').addEventListener('enter-vr', () => {
    document.getElementById('pantalla-inicio').style.display = 'none';
    if (!musica) {
      musica = new Audio('./orbitaSAN.mp3');
      musica.loop = true;
      musica.volume = 0.45;
    }
    musica.play().catch(e => {});
    document.getElementById('nube-palabras').setAttribute('visible', 'true');

    // Auto-activar configuración XR si detectamos que ha entrado específicamente en modo AR (Passthrough)
    var scene = document.querySelector('a-scene');
    if (scene.is('ar-mode')) {
      scene.setAttribute('fog', 'density: 0');
      document.querySelector('#estrellas').setAttribute('visible', 'false');
      scene.setAttribute('background', 'transparent: true; color: #000');
      
      document.querySelector('#btn-vr-active').setAttribute('color', '#111122');
      document.querySelector('#btn-xr-active').setAttribute('color', '#e0d070');
      document.querySelector('#btn-vr-active').querySelector('a-text').setAttribute('color', '#ffffff');
      document.querySelector('#btn-xr-active').querySelector('a-text').setAttribute('color', '#000000');
    }
  });

  window.addEventListener('load', () => { 
    crearEstrellas();
  });
</script>
</body>
</html>
