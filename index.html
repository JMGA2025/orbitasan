<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Órbita SAN - Soldadura VR & XR</title>
  
  <!-- Librería de A-Frame VR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- Google Fonts para la pantalla de bienvenida 2D -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; }
    #pantalla-inicio { position: fixed; inset: 0; z-index: 999; background: radial-gradient(circle at center, #050510 0%, #000000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; padding: 20px; transition: opacity 1s ease-in-out; }
    #pantalla-inicio::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.3; pointer-events: none; }
    
    #pantalla-inicio h2 { font-size: 1.2rem; color: #a0a0ff; margin-bottom: 0; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; }
    #pantalla-inicio h1 { font-family: 'Cinzel', serif; font-size: 4rem; color: #e0d070; margin-top: 0; margin-bottom: 0.5rem; letter-spacing: 6px; text-shadow: 0 0 20px rgba(224, 208, 112, 0.3); }
    #pantalla-inicio p { color: #bbb; font-size: 1.1rem; margin-bottom: 3rem; line-height: 1.6; max-width: 600px; }
    
    #btn-entrar { padding: 16px 56px; background: rgba(224, 208, 112, 0.05); border: 1px solid #e0d070; border-radius: 50px; color: #e0d070; font-size: 1.2rem; cursor: pointer; letter-spacing: 3px; transition: all 0.4s ease; box-shadow: 0 0 15px rgba(224, 208, 112, 0.1); }
    #btn-entrar:hover { background: #e0d070; color: #000; box-shadow: 0 0 30px rgba(224, 208, 112, 0.6); transform: scale(1.05); }
  </style>

  <script>
    // Mapeo preciso entre el ID de concepto, su término visual, tarjeta explicativa y etiqueta de fallback
    const ASOCIACIONES_SAN = {
      'concept_ac': { termSrc: './termino_ac.png', cardSrc: './ac.png', label: 'AC', w: 1.2, h: 0.4 },
      'concept_arco': { termSrc: './termino_arco-electrico.png', cardSrc: './arco-electrico.png', label: 'Arco Eléctrico', w: 1.8, h: 0.6 },
      'concept_bano': { termSrc: './termino_bano-de-fusion.png', cardSrc: './bano-de-fusion.png', label: 'Baño de Fusión', w: 1.8, h: 0.6 },
      'concept_cordon': { termSrc: './termino_cordon.png', cardSrc: './cordon.png', label: 'Cordón', w: 1.5, h: 0.5 },
      'concept_dc': { termSrc: './termino_dc.png', cardSrc: './dc.png', label: 'DC', w: 1.2, h: 0.4 },
      'concept_e6013': { termSrc: './termino_e6013.png', cardSrc: './e6013.png', label: 'E6013', w: 1.5, h: 0.5 },
      'concept_e7016': { termSrc: './termino_e7016.png', cardSrc: './e7016.png', label: 'E7016', w: 1.5, h: 0.5 },
      'concept_e7018': { termSrc: './termino_e7018.png', cardSrc: './e7018.png', label: 'E7018', w: 1.5, h: 0.5 },
      'concept_e7024': { termSrc: './termino_e7024.png', cardSrc: './e7024.png', label: 'E7024', w: 1.5, h: 0.5 },
      'concept_electrodo': { termSrc: './termino_electrodo.png', cardSrc: './electrodo.png', label: 'Electrodo', w: 1.8, h: 0.6 },
      'concept_escoria': { termSrc: './termino_escoria.png', cardSrc: './escoria.png', label: 'Escoria', w: 1.4, h: 0.35 },
      'concept_higroscopico': { termSrc: './termino_higroscopico.png', cardSrc: './higroscopico.png', label: 'Higroscópico', w: 1.6, h: 0.4 },
      'concept_intensidad': { termSrc: './termino_intensidad-de-corriente.png', cardSrc: './intensidad-de-corriente.png', label: 'Intensidad de Corriente', w: 2.4, h: 0.6 },
      'concept_ionizacion': { termSrc: './termino_ionizacion.png', cardSrc: './ionizacion.png', label: 'Ionización', w: 1.6, h: 0.4 },
      'concept_masa': { termSrc: './termino_masa.png', cardSrc: './masa.png', label: 'Masa', w: 1.2, h: 0.3 },
      'concept_penetracion': { termSrc: './termino_penetracion.png', cardSrc: './penetracion.png', label: 'Penetración', w: 1.6, h: 0.4 },
      'concept_piqueta': { termSrc: './termino_piqueta.png', cardSrc: './piqueta.png', label: 'Piqueta', w: 1.4, h: 0.35 },
      'concept_plasma': { termSrc: './termino_plasma.png', cardSrc: './plasma.png', label: 'Plasma', w: 1.4, h: 0.35 },
      'concept_polaridad': { termSrc: './termino_polaridad.png', cardSrc: './polaridad.png', label: 'Polaridad', w: 1.5, h: 0.375 },
      'concept_polaridad_directa': { termSrc: './termino_polaridad-directa-dcminus.png', cardSrc: './polaridad-directa-dcminus.png', label: 'Polaridad Directa DC-', w: 2.5, h: 0.5 },
      'concept_polaridad_inversa': { termSrc: './termino_polaridad-inversa-dcplus.png', cardSrc: './polaridad-inversa-dcplus.png', label: 'Polaridad Inversa DC+', w: 2.2, h: 0.5 },
      'concept_revestimiento': { termSrc: './termino_revestimiento.png', cardSrc: './revestimiento.png', label: 'Revestimiento', w: 1.8, h: 0.5 },
      'concept_tension': { termSrc: './termino_tension.png', cardSrc: './tension.png', label: 'Tensión', w: 1.4, h: 0.5 },
      'concept_wps': { termSrc: './termino_wps.png', cardSrc: './wps.png', label: 'WPS', w: 1.2, h: 0.5 },
      'concept_zat': { termSrc: './termino_zat.png', cardSrc: './zat.png', label: 'ZAT', w: 1.2, h: 0.5 }
    };

    // Componente de oscilación y flotación sutil e independiente
    AFRAME.registerComponent('movimiento-vivo', {
      init: function () {
        this.homePos = new THREE.Vector3().copy(this.el.object3D.position);
        this.proximoDestino();
      },
      proximoDestino: function () {
        const el = this.el;
        if (!el) return;
        
        // Desplazamiento sutil e independiente en ejes X, Y y Z
        const targetX = this.homePos.x + (Math.random() - 0.5) * 0.8;
        const targetY = this.homePos.y + (Math.random() - 0.5) * 0.6;
        const targetZ = this.homePos.z + (Math.random() - 0.5) * 0.6;
        const duracion = 5000 + Math.random() * 4000;

        el.setAttribute('animation__pos', {
          property: 'position',
          to: `${targetX} ${targetY} ${targetZ}`,
          dur: duracion,
          easing: 'easeInOutSine'
        });
        
        setTimeout(() => { if (this.el) this.proximoDestino(); }, duracion);
      }
    });

    // Componente de autogestión de imagen con fallback nativo en 3D
    AFRAME.registerComponent('render-termino', {
      schema: {
        texto: {type: 'string'},
        src: {type: 'string'},
        width: {type: 'number', default: 1.2},
        height: {type: 'number', default: 0.4}
      },
      init: function () {
        var el = this.el;
        var data = this.data;

        // 1. Crear el texto de respaldo blanco en 3D (visible inmediatamente en preview)
        var txt = document.createElement('a-text');
        txt.setAttribute('value', data.texto);
        txt.setAttribute('align', 'center');
        txt.setAttribute('color', '#ffffff');
        txt.setAttribute('font', 'exo2bold');
        txt.setAttribute('width', '4');
        el.appendChild(txt);

        // 2. Pre-cargar/Verificar la imagen en Vanilla JS para saltar bloqueos CORS
        var imgTester = new Image();
        imgTester.src = data.src;

        imgTester.onload = function () {
          // Si la imagen existe físicamente (Producción GitHub), ocultamos el texto y montamos el a-image
          txt.setAttribute('visible', 'false');
          
          var img = document.createElement('a-image');
          img.setAttribute('src', data.src);
          img.setAttribute('width', data.width);
          img.setAttribute('height', data.height);
          img.setAttribute('transparent', 'true');
          el.appendChild(img);
        };
      }
    });

    // Componente para la gestión interactiva y lógica del panel central explicativo
    AFRAME.registerComponent('panel-explicativo', {
      init: function () {
        var el = this.el;
        var cardImg = el.querySelector('#card-contenido-img');
        var fallbackTxt = el.querySelector('#panel-fallback-text');

        // Escuchar el evento de cambio de concepto
        el.addEventListener('mostrar-concepto', (evt) => {
          var cardSrc = evt.detail.cardSrc;
          var label = evt.detail.label;
          
          // Ocultar temporalmente ambos elementos para evitar parpadeos
          cardImg.setAttribute('visible', 'false');
          fallbackTxt.setAttribute('visible', 'false');

          // Probar si la imagen explicativa existe físicamente
          var imgTester = new Image();
          imgTester.src = cardSrc;

          imgTester.onload = function() {
            cardImg.setAttribute('src', cardSrc);
            cardImg.setAttribute('visible', 'true');
            fallbackTxt.setAttribute('visible', 'false');
          };

          imgTester.onerror = function() {
            cardImg.setAttribute('visible', 'false');
            fallbackTxt.setAttribute('visible', 'true');
            fallbackTxt.setAttribute('value', "ASOCIACIÓN ACTIVA:\n\n" + label.toUpperCase() + "\n\n[La tarjeta gráfica se mostrará al subir los archivos a tu GitHub]");
          };
        });
      }
    });

    // Componente interactivo para punteros láser de Quest 3 y mouse en PC
    AFRAME.registerComponent('palabra-interactiva', {
      schema: { idConcepto: {type: 'string'} },
      init: function () {
        var el = this.el;
        var data = this.data;

        // Hover: Resaltado visual en dorado SAN
        el.addEventListener('mouseenter', function () {
          var parent = el.parentNode;
          var img = parent.querySelector('a-image');
          if (img && img.getAttribute('visible') === 'true') {
            img.setAttribute('color', '#e0d070');
            img.setAttribute('scale', '1.25 1.25 1.25');
          }
          var txt = parent.querySelector('a-text');
          if (txt && txt.getAttribute('visible') === 'true') {
            txt.setAttribute('color', '#e0d070');
            txt.setAttribute('scale', '1.25 1.25 1.25');
          }
        });

        // Leave: Regresar al estado normal
        el.addEventListener('mouseleave', function () {
          var parent = el.parentNode;
          var img = parent.querySelector('a-image');
          if (img) {
            img.setAttribute('color', '#ffffff');
            img.setAttribute('scale', '1 1 1');
          }
          var txt = parent.querySelector('a-text');
          if (txt) {
            txt.setAttribute('color', '#ffffff');
            txt.setAttribute('scale', '1 1 1');
          }
        });

        // Selección: Disparar evento para actualizar el panel explicativo
        el.addEventListener('click', function () {
          var asociacion = ASOCIACIONES_SAN[data.idConcepto];
          if (!asociacion) return;

          var panel = document.querySelector('#panel-info-dinamico');
          
          // Emitimos el evento de cambio al panel explicativo enviando la URL literal de la tarjeta
          panel.emit('mostrar-concepto', { 
            cardSrc: asociacion.cardSrc,
            label: asociacion.label
          });
          
          panel.setAttribute('visible', 'true');
          panel.setAttribute('animation__abrir', 'property: scale; from: 0.01 0.01 0.01; to: 1 1 1; dur: 450; easing: easeOutBack');
        });
      }
    });

    // Componente para alternar entre el modo VR (Cielo espacial) e XR (Passthrough/Mixto)
    AFRAME.registerComponent('control-entorno', {
      schema: { modo: {type: 'string'} },
      init: function () {
        var el = this.el;
        var modo = this.data.modo;

        el.addEventListener('mouseenter', function () {
          el.setAttribute('scale', '1.1 1.1 1.1');
        });
        el.addEventListener('mouseleave', function () {
          el.setAttribute('scale', '1 1 1');
        });

        el.addEventListener('click', function () {
          var scene = document.querySelector('a-scene');
          var estrellas = document.querySelector('#estrellas');
          var btnVR = document.querySelector('#btn-vr-active');
          var btnXR = document.querySelector('#btn-xr-active');

          if (modo === 'xr') {
            scene.setAttribute('fog', 'density: 0');
            estrellas.setAttribute('visible', 'false');
            scene.setAttribute('background', 'transparent: true; color: #000');
            
            btnVR.setAttribute('color', '#111122');
            btnXR.setAttribute('color', '#e0d070');
            btnVR.querySelector('a-text').setAttribute('color', '#ffffff');
            btnXR.querySelector('a-text').setAttribute('color', '#000000');
          } else {
            scene.setAttribute('fog', 'type: exponential; color: #000008; density: 0.06');
            estrellas.setAttribute('visible', 'true');
            scene.setAttribute('background', 'color: #000005');
            
            btnVR.setAttribute('color', '#e0d070');
            btnXR.setAttribute('color', '#111122');
            btnVR.querySelector('a-text').setAttribute('color', '#000000');
            btnXR.querySelector('a-text').setAttribute('color', '#ffffff');
          }
        });
      }
    });
  </script>
</head>
<body>

<!-- Pantalla de Bienvenida (Capa 2D) -->
<div id="pantalla-inicio">
  <h2>MÓDULO SAN</h2>
  <h1>ÓRBITA SAN</h1>
  <p>Glosario de Soldadura en Atmósfera Natural interactivo.<br>
  <small style="font-size: 0.85rem; color:#888; margin-top:10px; display:inline-block;">Apunta a las palabras flotantes y pulsa el gatillo de tus mandos de Meta Quest 3 o haz clic en PC.</small></p>
  <button id="btn-entrar" onclick="iniciar()">ENTRAR</button>
</div>

<!-- Escena VR de A-Frame libre de bloqueo por assets -->
<a-scene background="color:#000005" 
         fog="type: exponential; color: #000008; density: 0.06" 
         renderer="antialias: true; colorManagement: true;"
         webxr="referenceSpaceType: localFloor; optionalFeatures: pass-through;"
         cursor="rayOrigin: mouse"
         raycaster="objects: .interactable; interval: 100">
  
  <a-assets>
    <!-- Textura de seguridad de carga provisional -->
    <img id="fallback" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
  </a-assets>

  <!-- Luces estéticas de ambiente y apoyo -->
  <a-light type="ambient" color="#111122"></a-light>
  <a-light type="point" position="0 5 0" color="#5555aa" intensity="0.6"></a-light>
  
  <!-- Espacio estelar dinámico -->
  <a-entity id="estrellas"></a-entity>

  <!-- PANEL DE SELECCIÓN DE ENTORNO DISCRETO (VR vs XR) -->
  <a-entity id="consola-entorno" position="-1.0 0.7 -1.2" rotation="-40 40 0">
    <a-plane width="0.9" height="0.6" color="#000" opacity="0.95" material="shader:flat">
      <a-plane width="0.93" height="0.63" color="#e0d070" position="0 0 -0.01" opacity="0.3" material="shader:flat"></a-plane>
      <a-text value="ENTORNO" font="exo2bold" align="center" color="#e0d070" width="2.2" position="0 0.20 0.01"></a-text>
      
      <!-- Botón Modo VR -->
      <a-plane id="btn-vr-active" class="interactable" control-entorno="modo: vr" width="0.75" height="0.13" color="#e0d070" position="0 0.04 0.02" material="shader:flat">
        <a-text value="VR ESPACIO" font="exo2bold" align="center" color="#000" width="1.8"></a-text>
      </a-plane>

      <!-- Botón Modo XR -->
      <a-plane id="btn-xr-active" class="interactable" control-entorno="modo: xr" width="0.75" height="0.13" color="#111122" position="0 -0.13 0.02" material="shader:flat">
        <a-text value="XR MIXTA" font="exo2bold" align="center" color="#fff" width="1.8"></a-text>
      </a-plane>
    </a-plane>
  </a-entity>

  <!-- NUBE DE TÉRMINOS FLOTANTES EN 360 GRADOS -->
  <a-entity id="nube-palabras" position="0 0 0" visible="false" animation="property: rotation; to: 0 360 0; loop: true; dur: 75000; easing: linear">
    
    <!-- 1. AC (Ángulo 0.0°) -->
    <a-entity movimiento-vivo position="0 1.7 -3.2">
      <a-entity render-termino="texto: AC; src: ./termino_ac.png; width: 1.2; height: 0.4"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_ac" width="1.6" height="0.8" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>
    
    <!-- 2. Arco Eléctrico (Ángulo 14.4°) -->
    <a-entity movimiento-vivo position="0.80 1.3 -3.10" rotation="0 -14.4 0">
      <a-entity render-termino="texto: Arco electrico; src: ./termino_arco-electrico.png; width: 1.8; height: 0.6"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_arco" width="2.2" height="1.0" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>
    
    <!-- 3. Baño de Fusión (Ángulo 28.8°) -->
    <a-entity movimiento-vivo position="1.54 2.0 -2.80" rotation="0 -28.8 0">
      <a-entity render-termino="texto: Bano de fusion; src: ./termino_bano-de-fusion.png; width: 1.8; height: 0.6"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_bano" width="2.2" height="1.0" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 4. Cordón (Ángulo 43.2°) -->
    <a-entity movimiento-vivo position="2.19 1.5 -2.33" rotation="0 -43.2 0">
      <a-entity render-termino="texto: Cordon; src: ./termino_cordon.png; width: 1.5; height: 0.5"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_cordon" width="1.9" height="0.9" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>
    
    <!-- 5. DC (Ángulo 57.6°) -->
    <a-entity movimiento-vivo position="2.70 1.8 -1.71" rotation="0 -57.6 0">
      <a-entity render-termino="texto: DC; src: ./termino_dc.png; width: 1.2; height: 0.4"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_dc" width="1.6" height="0.8" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 6. E6013 (Ángulo 72.0°) -->
    <a-entity movimiento-vivo position="3.04 1.2 -0.99" rotation="0 -72.0 0">
      <a-entity render-termino="texto: E6013; src: ./termino_e6013.png; width: 1.5; height: 0.5"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_e6013" width="1.9" height="0.9" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 7. E7016 (Ángulo 86.4°) -->
    <a-entity movimiento-vivo position="3.19 2.2 -0.20" rotation="0 -86.4 0">
      <a-entity render-termino="texto: E7016; src: ./termino_e7016.png; width: 1.5; height: 0.5"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_e7016" width="1.9" height="0.9" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>
    
    <!-- 8. E7018 (Ángulo 100.8°) -->
    <a-entity movimiento-vivo position="3.14 1.4 0.60" rotation="0 -100.8 0">
      <a-entity render-termino="texto: E7018; src: ./termino_e7018.png; width: 1.5; height: 0.5"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_e7018" width="1.9" height="0.9" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 9. E7024 (Ángulo 115.2°) -->
    <a-entity movimiento-vivo position="2.90 1.9 1.36" rotation="0 -115.2 0">
      <a-entity render-termino="texto: E7024; src: ./termino_e7024.png; width: 1.5; height: 0.5"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_e7024" width="1.9" height="0.9" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 10. Electrodo (Ángulo 129.6°) -->
    <a-entity movimiento-vivo position="2.46 1.1 2.04" rotation="0 -129.6 0">
      <a-entity render-termino="texto: Electrodo; src: ./termino_electrodo.png; width: 1.8; height: 0.6"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_electrodo" width="2.2" height="1.0" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 11. Escoria (Ángulo 144.0°) -->
    <a-entity movimiento-vivo position="1.88 2.3 2.59" rotation="0 -144.0 0">
      <a-entity render-termino="texto: Escoria; src: ./termino_escoria.png; width: 1.4; height: 0.35"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_escoria" width="1.8" height="0.75" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 12. Higroscópico (Ángulo 158.4°) -->
    <a-entity movimiento-vivo position="1.18 1.6 2.98" rotation="0 -158.4 0">
      <a-entity render-termino="texto: Higroscopico; src: ./termino_higroscopico.png; width: 1.6; height: 0.4"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_higroscopico" width="2.0" height="0.8" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 13. Intensidad de Corriente (Ángulo 172.8°) -->
    <a-entity movimiento-vivo position="0.40 1.9 3.18" rotation="0 -172.8 0">
      <a-entity render-termino="texto: Intensidad; src: ./termino_intensidad-de-corriente.png; width: 2.4; height: 0.6"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_intensidad" width="2.8" height="1.0" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 14. Ionización (Ángulo 187.2°) -->
    <a-entity movimiento-vivo position="-0.40 1.3 3.18" rotation="0 -187.2 0">
      <a-entity render-termino="texto: Ionizacion; src: ./termino_ionizacion.png; width: 1.6; height: 0.4"></a-entity>
      <a-plane class="interactable" palabra-interactiva="idConcepto: concept_ionizacion" width="2.0" height="0.8" material="opacity: 0; transparent: true" position="0 0 0.01"></a-plane>
    </a-entity>

    <!-- 15. Masa (Ángulo 201.6°) -->

    <a-entity laser-controls="hand:left" raycaster="objects: .interactable; far:10; showLine: true" line="color: #4444aa; opacity: 0.5"></a-entity>
    <a-entity id="control-derecho" laser-controls="hand:right" raycaster="objects: .interactable; far:10; showLine: true" line="color: #e0d070; opacity: 0.5"></a-entity>

<script>
  // Inicialización de música de fondo y desvanecimiento de la pantalla de carga
  var musica = null;
  function iniciar() {
    document.getElementById('pantalla-inicio').style.opacity = '0';
    
    // Cargar e iniciar audio de forma totalmente asíncrona mediante JS nativo
    if (!musica) {
      musica = new Audio('./orbitaSAN.mp3');
      musica.loop = true;
      musica.volume = 0.45;
    }
    musica.play().catch(e => console.log("Audio esperando interacción del navegador."));

    setTimeout(() => { 
      document.getElementById('pantalla-inicio').style.display = 'none';
      document.getElementById('nube-palabras').setAttribute('visible', 'true');
    }, 1000);
  }

  // Generador estético de campo de estrellas 3D
  function crearEstrellas() {
    const contenedor = document.getElementById('estrellas');
    for (let i = 0; i < 250; i++) {
      const e = document.createElement('a-sphere');
      const r = 25 + Math.random() * 10;
      const t = Math.random() * Math.PI * 2;
      const p = Math.random() * Math.PI;
      e.setAttribute('position', `${r * Math.sin(p) * Math.cos(t)} ${r * Math.cos(p)} ${r * Math.sin(p) * Math.sin(t)}`);
      e.setAttribute('radius', 0.02 + Math.random() * 0.04);
      e.setAttribute('material', 'color: #ffffff; shader: flat');
      contenedor.appendChild(e);
    }
  }

  // Acceso inmediato si el visor Meta Quest 3 inicia directo en modo VR/XR
  document.querySelector('a-scene').addEventListener('enter-vr', () => {
    document.getElementById('pantalla-inicio').style.display = 'none';
    if (!musica) {
      musica = new Audio('./orbitaSAN.mp3');
      musica.loop = true;
      musica.volume = 0.45;
    }
    musica.play().catch(e => {});
    document.getElementById('nube-palabras').setAttribute('visible', 'true');

    // Auto-activar configuración XR si detectamos que ha entrado específicamente en modo AR (Passthrough)
    var scene = document.querySelector('a-scene');
    if (scene.is('ar-mode')) {
      scene.setAttribute('fog', 'density: 0');
      document.querySelector('#estrellas').setAttribute('visible', 'false');
      scene.setAttribute('background', 'transparent: true; color: #000');
      
      document.querySelector('#btn-vr-active').setAttribute('color', '#111122');
      document.querySelector('#btn-xr-active').setAttribute('color', '#e0d070');
      document.querySelector('#btn-vr-active').querySelector('a-text').setAttribute('color', '#ffffff');
      document.querySelector('#btn-xr-active').querySelector('a-text').setAttribute('color', '#000000');
    }
  });

  window.addEventListener('load', () => { 
    crearEstrellas();
  });
</script>
